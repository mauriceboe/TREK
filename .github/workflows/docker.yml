name: Build & Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_IMAGE: ${{ github.repository_owner }}/trek

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Prepare platform tag-safe name
        run: echo "PLATFORM_PAIR=$(echo ${{ matrix.platform }} | sed 's|/|-|g')" >> $GITHUB_ENV

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push by digest (Docker Hub)
        id: build-dockerhub
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=mauriceboe/trek,push-by-digest=true,name-canonical=true,push=true
          provenance: false
          no-cache: true

      - name: Build and push by digest (GHCR)
        id: build-ghcr
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export digests
        run: |
          mkdir -p /tmp/digests-dockerhub /tmp/digests-ghcr
          dh_digest="${{ steps.build-dockerhub.outputs.digest }}"
          touch "/tmp/digests-dockerhub/${dh_digest#sha256:}"
          ghcr_digest="${{ steps.build-ghcr.outputs.digest }}"
          touch "/tmp/digests-ghcr/${ghcr_digest#sha256:}"

      - name: Upload Docker Hub digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-dockerhub-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests-dockerhub/*
          if-no-files-found: error
          retention-days: 1

      - name: Upload GHCR digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-ghcr-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests-ghcr/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: echo "VERSION=$(node -p "require('./server/package.json').version")" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Download Docker Hub digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests-dockerhub
          pattern: digests-dockerhub-*
          merge-multiple: true

      - name: Download GHCR digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests-ghcr
          pattern: digests-ghcr-*
          merge-multiple: true

      - name: Create and push Docker Hub multi-arch manifest
        working-directory: /tmp/digests-dockerhub
        run: |
          mapfile -t digests < <(printf 'mauriceboe/trek@sha256:%s\n' *)
          docker buildx imagetools create \
            -t mauriceboe/trek:latest \
            -t mauriceboe/trek:${{ steps.version.outputs.VERSION }} \
            -t mauriceboe/nomad:latest \
            -t mauriceboe/nomad:${{ steps.version.outputs.VERSION }} \
            "${digests[@]}"

      - name: Create and push GHCR multi-arch manifest
        working-directory: /tmp/digests-ghcr
        run: |
          mapfile -t digests < <(printf '${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE }}@sha256:%s\n' *)
          docker buildx imagetools create \
            -t ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE }}:latest \
            -t ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.VERSION }} \
            "${digests[@]}"

      - name: Inspect manifests
        run: |
          docker buildx imagetools inspect mauriceboe/trek:latest
          docker buildx imagetools inspect ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE }}:latest
